spring:
  application:
    name: notification

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.MariaDBDialect

  jackson:
    time-zone: Asia/Seoul

  datasource:
    url: jdbc:mariadb://localhost:3307/noti # docker-compose의 mariadb 서비스 이름과 포트에 맞춤
    username: root
    password: qwer1234
    driver-class-name: org.mariadb.jdbc.Driver

  redis:
    host: redis # docker-compose의 redis 서비스 이름에 맞춤
    port: 6379
    password: # 비밀번호가 없으므로 빈 값으로 둠

tag:
  version: 0.2.0





